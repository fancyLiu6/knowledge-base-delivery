global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: knowledge-base

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  # Prometheus 自身监控
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Nginx Exporter — 核心指标（需安装 nginx-module-stub-status）
  # QPS / 状态码分布 / 连接数
  - job_name: "nginx-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: "knowledge-base"
          tier: "frontend"

  # 应用健康检查（走 nginx_exporter 指标判断存活）
  # 注：/health 端点返回 JSON，由 Docker/K8s 探针消费，不在此处抓取
