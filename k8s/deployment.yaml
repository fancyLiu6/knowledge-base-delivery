apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-base
  labels:
    app: knowledge-base
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-base
  template:
    metadata:
      labels:
        app: knowledge-base
    spec:
      containers:
        - name: knowledge-base
          image: knowledge-base:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-base
  labels:
    app: knowledge-base
spec:
  type: ClusterIP
  selector:
    app: knowledge-base
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: metrics
      port: 9113
      targetPort: 9113
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: knowledge-base
  labels:
    app: knowledge-base
spec:
  selector:
    matchLabels:
      app: knowledge-base
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
    - port: http
      interval: 30s
      path: /nginx_status
